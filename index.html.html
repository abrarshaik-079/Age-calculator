<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Age Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0e0c0a;--cream:#f5f0e8;--sand:#e8dfc8;--amber:#c9862a;--rust:#a34a28;--muted:#7a6f60;--accent:#1a3a4a}
body{min-height:100vh;background:var(--cream);font-family:'DM Mono',monospace;display:flex;flex-direction:column;align-items:center;padding:60px 20px;background-image:radial-gradient(ellipse at 20% 10%,rgba(201,134,42,.08),transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(163,74,40,.07),transparent 50%)}
header{text-align:center;margin-bottom:48px;animation:down .7s ease both}
.eyebrow{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,6vw,3.8rem);font-weight:700;line-height:1.1}
h1 em{font-style:italic;color:var(--rust)}
.sub{margin-top:12px;font-size:11px;letter-spacing:.15em;color:var(--muted)}
.card{width:100%;max-width:560px;background:#fff;border:1.5px solid var(--sand);border-radius:4px;padding:40px 44px;box-shadow:6px 6px 0 var(--sand);animation:up .7s .15s ease both}
label.lbl{display:block;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.row{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:12px;margin-bottom:32px}
.field{display:flex;flex-direction:column;gap:5px}
.field span{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}
input{width:100%;padding:11px 13px;border:1.5px solid var(--sand);border-radius:2px;background:var(--cream);font-family:'DM Mono',monospace;font-size:15px;color:var(--ink);outline:none;-moz-appearance:textfield;transition:border-color .2s,background .2s}
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--amber);background:#fff}
input.err{border-color:var(--rust)}
.today{display:flex;gap:10px;align-items:center;margin-bottom:26px;font-size:10px}
.today span:first-child{letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
#td{color:var(--accent)}
btn,button{width:100%;padding:15px;background:var(--ink);color:var(--cream);border:none;border-radius:2px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.35em;text-transform:uppercase;cursor:pointer;transition:background .2s}
button:hover{background:var(--accent)}
.emsg{margin-top:12px;font-size:11px;color:var(--rust);min-height:16px;text-align:center}
#res{width:100%;max-width:560px;margin-top:24px;display:none}
.banner{background:linear-gradient(135deg,var(--amber),var(--rust));color:#fff;border-radius:4px;padding:16px;text-align:center;font-family:'Playfair Display',serif;font-style:italic;margin-bottom:12px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,134,42,.4)}50%{box-shadow:0 0 0 10px rgba(201,134,42,0)}}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.stat{background:#fff;border:1.5px solid var(--sand);border-radius:4px;padding:20px 6px;text-align:center;box-shadow:3px 3px 0 var(--sand);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--amber),var(--rust))}
.sn{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,3vw,2.2rem);font-weight:700;display:block;line-height:1;animation:pop .55s cubic-bezier(.16,1,.3,1) both}
.sl{font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-top:7px;display:block}
.strip{background:#fff;border:1.5px solid var(--sand);border-radius:4px;box-shadow:3px 3px 0 var(--sand);display:grid;grid-template-columns:repeat(3,1fr);overflow:hidden}
.si{display:flex;flex-direction:column;align-items:center;gap:4px;padding:20px 8px;text-align:center;border-right:1.5px solid var(--sand);transition:background .18s}
.si:last-child{border-right:none}
.si:hover{background:var(--cream)}
.si .ico{font-size:1.2rem}
.si .ilb{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.si .iv{font-family:'Playfair Display',serif;font-size:clamp(.75rem,1.5vw,.95rem);font-weight:700}
footer{margin-top:44px;font-size:10px;letter-spacing:.15em;color:var(--muted)}
@keyframes down{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:none}}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.5) translateY(10px)}to{opacity:1;transform:none}}
@media(max-width:480px){.card{padding:28px 20px}.row{grid-template-columns:1fr 1fr}.row .field:last-child{grid-column:1/-1}.grid{grid-template-columns:repeat(3,1fr)}.strip{grid-template-columns:1fr}.si{border-right:none;border-bottom:1.5px solid var(--sand)}.si:last-child{border-bottom:none}}
</style>
</head>
<body>
<header>
  <p class="eyebrow">Hello, Welcome</p>
  <h1>How Old Are<br/><em>You, Really?</em></h1>
  <p class="sub">Enter your date of birth · Discover your age in full detail</p>
</header>
<div class="card">
  <label class="lbl">Date of Birth</label>
  <div class="row">
    <div class="field"><span>Day</span><input id="D" type="number" placeholder="DD" min="1" max="31"/></div>
    <div class="field"><span>Month</span><input id="M" type="number" placeholder="MM" min="1" max="12"/></div>
    <div class="field"><span>Year</span><input id="Y" type="number" placeholder="YYYY" min="1900"/></div>
  </div>
  <div class="today"><span>Today —</span><span id="td"></span></div>
  <button onclick="calc()">Calculate My Age</button>
  <p class="emsg" id="em"></p>
</div>
<div id="res"></div>
<footer>© <span id="yr"></span> Age Calculator · Time is fleeting</footer>
<script>
const now=()=>{const d=new Date();d.setHours(0,0,0,0);return d};
const N=now();
document.getElementById('td').textContent=N.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
document.getElementById('yr').textContent=N.getFullYear();
const $=id=>document.getElementById(id);
['D','M','Y'].forEach((id,i,a)=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();i<2?$(a[i+1]).focus():calc()}}));
function daysIn(y,m){return new Date(y,m,0).getDate()}
function fmt(d){return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getFullYear()}
function calc(){
  const n=now(),d=+$('D').value,m=+$('M').value,y=+$('Y').value;
  const inputs=[$('D'),$('M'),$('Y')];
  inputs.forEach(el=>el.classList.remove('err'));
  $('em').textContent='';
  const fail=(msg,...els)=>{$('em').textContent=msg;els.forEach(el=>el.classList.add('err'))};
  if(!d||!m||!y) return fail('Please fill in all three fields.',...inputs.filter((_,i)=>[!d,!m,!y][i]));
  if(m<1||m>12) return fail('Month must be between 1 and 12.',$('M'));
  const mx=daysIn(y,m);
  if(d<1||d>mx) return fail(`Day must be between 1 and ${mx}.`,$('D'));
  if(y<1900||y>n.getFullYear()) return fail(`Year must be between 1900 and ${n.getFullYear()}.`,$('Y'));
  const dob=new Date(y,m-1,d);
  if(dob>=n) return fail('Date of birth must be in the past.',...inputs);

  let yrs=n.getFullYear()-dob.getFullYear(),mos=n.getMonth()-dob.getMonth(),dys=n.getDate()-dob.getDate();
  if(dys<0){mos--;dys+=daysIn(n.getFullYear(),n.getMonth())}
  if(mos<0){yrs--;mos+=12}

  const ms=n-dob,wks=Math.floor(ms/6048e5),hrs=Math.floor(ms/36e5);
  const isBday=dob.getDate()===n.getDate()&&dob.getMonth()===n.getMonth();
  const nb=new Date(n.getFullYear(),dob.getMonth(),dob.getDate());
  if(nb<=n)nb.setFullYear(n.getFullYear()+1);
  const dtn=Math.round((nb-n)/864e5);
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const res=$('res');
  res.style.display='block';
  res.innerHTML=`
    ${isBday?'<div class="banner">🎂 Happy Birthday! Today is your special day!</div>':''}
    <div class="grid">
      ${[['Years',yrs,0],['Months',mos,.07],['Weeks',wks.toLocaleString(),.14],['Days',dys,.21],['Day Born',days[dob.getDay()],.28]].map(([l,v,d])=>
        `<div class="stat"><span class="sn" style="animation-delay:${d}s;${l==='Day Born'?'font-size:clamp(.7rem,1.4vw,.95rem)':''}">${v}</span><span class="sl">${l}</span></div>`
      ).join('')}
    </div>
    <div class="strip">
      <div class="si"><span class="ico">📅</span><span class="ilb">Born on</span><span class="iv">${fmt(dob)}</span></div>
      <div class="si"><span class="ico">⏳</span><span class="ilb">Hours lived</span><span class="iv">${hrs.toLocaleString()}</span></div>
      <div class="si"><span class="ico">🎂</span><span class="ilb">${isBday?'Birthday!':'Next birthday'}</span><span class="iv">${isBday?'🎉 Today':dtn+' day'+(dtn!==1?'s':'')}</span></div>
    </div>`;
  res.scrollIntoView({behavior:'smooth',block:'nearest'});
}
</script>
</body>
</html>
